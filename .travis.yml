language: python

# use an older trust image, because the newer images cause build errors with
# psycopg2 that comes with CKAN<2.8:
#   "Error: could not determine PostgreSQL version from '10.1'"
# see https://github.com/travis-ci/travis-ci/issues/8897
dist: trusty
group: deprecated-2017Q4

flake8-steps: &flake8-steps
  env: FLAKE8=true
  cache: pip
  install: pip install flake8
  before_script:
    - flake8 --version
    # stop the build if there are Python syntax errors or undefined names
    - flake8 . --count --select=E901,E999,F821,F822,F823 --show-source --statistics --exclude ckan,ckanext-downloadall
    # exit-zero treats all errors as warnings.  The GitHub editor is 127 chars wide
    - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude ckan,ckanext-downloadall
  script:
    - true

matrix:
  include:
    - python:
        - "2.7"
      env:
        - CKANVERSION=master
        - CKANVERSION=2.7
        - CKANVERSION=2.8
      services:
        - postgresql
        - redis-server
      install:
        - bash bin/travis-build.bash
        - pip install coveralls
      script: sh bin/travis-run.sh
      after_success:
        - coveralls

    - python: "2.7"
      <<: *flake8-steps

    - python: "3.7"
      dist: xenial    # required for Python 3.7
      <<: *flake8-steps
