language: python

# use an older trust image, because the newer images cause build errors with
# psycopg2 that comes with CKAN<2.8:
#   "Error: could not determine PostgreSQL version from '10.1'"
# see https://github.com/travis-ci/travis-ci/issues/8897
dist: trusty
group: deprecated-2017Q4

# use stages, so that e.g. Python syntax errors are caught early
stages:
  - lint-essential-2.7
  - test
  - lint3.7

# matrix
python:
  - 2.7
env:
  - CKANVERSION=master
  - CKANVERSION=2.7
  - CKANVERSION=2.8

# for tests
script: sh bin/travis-run.sh
install:
  - bash bin/travis-build.bash
  - pip install coveralls

jobs:
  include:
    - stage: lint-essential-2.7
      name: "Flake8 essentials"
      env: FLAKE8=true
      cache: pip
      install: pip install flake8
      script:
        - flake8 --version
        # stop the build if there are Python syntax errors or undefined names
        - flake8 . --count --select=E901,E999,F821,F822,F823 --show-source --statistics --exclude ckan,ckanext-downloadall
      # overwrite matrix
      env: CKANVERSION=master

    - stage: test
      services:
        - postgresql
        - redis-server
      after_success:
        - coveralls

    - stage: lint-2.7
      name: "Flake8 on Python 2.7"
      env: FLAKE8=true
      cache: pip
      install: pip install flake8
      script:
        - flake8 --version
        - flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude ckan,ckanext-downloadall      # overwrite matrix
      env: CKANVERSION=master

    - stage: lint-3.7
      name: "Flake8 on Python 3.7"
      env: FLAKE8=true
      cache: pip
      install: pip install flake8
      script:
        - flake8 --version
        - flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude ckan,ckanext-downloadall      # overwrite matrix
      env: CKANVERSION=master
